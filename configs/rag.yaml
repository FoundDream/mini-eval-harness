task:
  type: rag_qa

dataset: data/rag_qa.jsonl
prompt: prompts/rag_qa_v1.txt
results_dir: results
reports_dir: reports
run_id: rag_deepseek

knowledge_base:
  path: docs/rag_demo
  glob: "*.md"
  chunk_size: 700
  chunk_overlap: 80

retriever:
  type: bm25
  top_k: 3

evaluator:
  type: heuristic_rag
  context_recall_threshold: 0.8
  faithfulness_threshold: 0.6
  answer_relevancy_threshold: 0.5

model:
  provider: openai
  name: deepseek-v4-flash
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  temperature: 0.0
  top_p: 1.0
  max_tokens: 512
  timeout_seconds: 120.0
  extra_body:
    thinking:
      type: disabled
